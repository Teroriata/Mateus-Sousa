name: Continuos Integration

on: 
  pull_request:
    branches:
      ['master']

jobs:
  Continuos-Integration:
    ruins-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v3
      - name: Using Node.js
        uses: actions/setup-node@v2
        with: 
          node-version: 16.
      - name: run install, build and teste
        run: |
          npm install
          npm run build
          npm run test